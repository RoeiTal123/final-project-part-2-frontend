<!DOCTYPE html>
<html>

<head>
    <title>Cat Sanctuary</title>
    <link rel="stylesheet" href="../design/pages/login.css">
</head>
<script src="../javascript/login.js" type="module"></script>

<body>
    <div class="body">
        <div class="login-window" id="loginWindow">
            <form id="loginForm">
                <section>
                    <h1>Login</h1>
                    <input class="input" type="text" id="login-username" name="username" pattern="[a-zA-Z0-9]+" placeholder="username" value="catlover123" required><br><br>
                    <input class="input" type="password" id="login-password" minlength="8" name="password" placeholder="password" value="password123" required><br><br>
                    
                    <input class="submit-btn" type="button" value="OK" onclick="submitLoginForm()">
                    
                    <div class="toggle-container">
                        <p>Don't have an account? <a href="#" onclick="showSignup(event)">Sign up here</a></p>
                    </div>
                </section>
            </form>
        </div>
        <div class="login-window hidden" id="signupWindow">
            <form id="signupForm">
                <section>
                    <h1>Sign Up</h1>
                    <input class="input" type="text" oninput="removeNumbers(event)" id="fname" name="fname" placeholder="first name" required><br><br>
                    <input class="input" type="text" oninput="removeNumbers(event)" id="lname" name="lname" placeholder="last name" required><br><br>
                    <input class="input" type="tel" oninput="formatPhoneNumber(event)" id="phone" name="phone" placeholder="phone number" maxlength="12" required><br><br>
                    <input class="input" type="email" id="email" name="email" placeholder="email: local@domain.top" required><br><br>
                    <input class="input" type="text" id="signup-username" name="username" pattern="[a-zA-Z0-9]+" placeholder="username" required><br><br>
                    <input class="input" type="password" id="signup-password" minlength="8" name="password" placeholder="password" required><br><br>
                    <input class="input" type="date" id="dob" name="dob" required><br><br>
                    
                    <div class="textarea-container">
                        <textarea class="input textarea-box" id="cat-likes" name="cat-likes" placeholder="What do you like about cats?" rows="4" oninput="countLetters(this)" required></textarea>
                        <span class="word-counter" id="word-count-display">0/1000</span>
                    </div> 
                    <br><br>
                    
                    <input class="submit-btn" type="button" value="OK" onclick="submitSignupForm()">
                    
                    <div class="toggle-container">
                        <p>Already have an account? <a href="#" onclick="showLogin(event)">Log in here</a></p>
                    </div>
                </section>
            </form>
        </div>
    </div>

</body>

</html>
